# Build on push/PR. GitHub Pages publica desde la carpeta /docs en main
# (Settings → Pages → Deploy from branch → /docs).

name: Build game with webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install node modules
        run: npm ci

      - name: Build game with webpack
        run: npm run build