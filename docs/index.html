        html,
        body {

            position: fixed;

            transform: translateX(-50%);
            width: min(320px, calc(100% - 32px));
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
<script defer src="phaser-69325db5484b60dded91.bundle.js"></script><script defer src="main-6e505b404459972fde4e.bundle.js"></script></head>

<body>
    <div id="mobile-launch-overlay">
        <div id="mobile-launch-actions">
            <button id="mobile-launch-button" class="mobile-launch-button" type="button" disabled>Loading game...</button>
            <button id="mobile-flush-button" class="mobile-launch-button" type="button">Clear Saved Data</button>
            <div id="mobile-flush-status" aria-live="polite"></div>
        </div>
        <div id="mobile-launch-hint">On some phones, fullscreen only works after a tap. If Safari blocks it, the game will still open using the full browser area.</div>
    </div>
    <script>
        (function () {
            const isMobileDevice = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints > 0 && Math.min(screen.width, screen.height) < 1024);

            if (!isMobileDevice) {
                return;
            }

            const GAME_STORAGE_KEYS = [
                "candybear2-highest-completed-level",
                "candybear2-total-coins",
                "candybear2-level-stars",
                "candybear2-level-likes",
                "candybear2-total-likes",
                "candybear2-has-opened-before",
                "candybear2-acquired-products",
                "candybear2-acquired-workstations",
                "candybear2-bought-moment-cards"
            ];

            const overlay = document.getElementById("mobile-launch-overlay");
            const launchButton = document.getElementById("mobile-launch-button");
            const flushButton = document.getElementById("mobile-flush-button");
            const flushStatus = document.getElementById("mobile-flush-status");

            const clearStoredProgress = () => {
                for (const storageKey of GAME_STORAGE_KEYS) {
                    window.localStorage.removeItem(storageKey);
                }
            };

            const requestFullscreen = async () => {
                const root = document.documentElement;
                const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;

                if (fullscreenElement) {
                    return true;
                }

                try {
                    if (root.requestFullscreen) {
                        await root.requestFullscreen();
                        return true;
                    }

                    if (root.webkitRequestFullscreen) {
                        root.webkitRequestFullscreen();
                        return true;
                    }
                } catch (_) {
                    return false;
                }

                return false;
            };

            const expandBrowserArea = () => {
                document.body.style.minHeight = "100dvh";
                window.scrollTo(0, 1);
            };

            const lockOrientation = async () => {
                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock("landscape");
                    }
                } catch (_) {
                    // Orientation lock is optional and unsupported on many mobile browsers.
                }
            };

            const refreshGameScale = () => {
                if (typeof window.refreshCandyBearGameScale === "function") {
                    window.refreshCandyBearGameScale();
                } else {
                    window.dispatchEvent(new Event("resize"));
                }
            };

            const bootGame = () => {
                if (typeof window.bootCandyBearGame === "function") {
                    window.bootCandyBearGame();
                    return;
                }

                window.addEventListener("candybear-game-ready", () => {
                    window.bootCandyBearGame?.();
                }, { once: true });
            };

            const launchGame = async () => {
                if (launchButton.disabled) {
                    return;
                }

                launchButton.disabled = true;
                overlay.classList.remove("visible");
                expandBrowserArea();
                bootGame();
                await requestFullscreen();
                refreshGameScale();
                window.requestAnimationFrame(() => {
                    refreshGameScale();
                    window.requestAnimationFrame(refreshGameScale);
                });
                window.setTimeout(refreshGameScale, 200);
                await lockOrientation();
                window.setTimeout(refreshGameScale, 400);
            };

            const flushStoredProgress = () => {
                const confirmed = window.confirm(
                    "Clear all saved progress? This removes unlocked levels, stars, and coins."
                );

                if (!confirmed) {
                    return;
                }

                clearStoredProgress();
                flushStatus.textContent = "Saved data cleared. Tap play to start fresh.";
            };

            const enableLaunchButton = () => {
                launchButton.disabled = false;
                launchButton.textContent = "Tap To Play Fullscreen";
            };

            overlay.classList.add("visible");
            launchButton.addEventListener("click", launchGame, { once: true });
            flushButton.addEventListener("click", flushStoredProgress);

            if (typeof window.bootCandyBearGame === "function") {
                enableLaunchButton();
            } else {
                window.addEventListener("candybear-game-ready", enableLaunchButton, { once: true });
            }
        })();
    </script>
</body>

</html>
